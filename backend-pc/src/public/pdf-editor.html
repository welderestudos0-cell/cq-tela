<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Painel PDF</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --line: #d9e0e6;
      --txt: #1f2a34;
      --muted: #657482;
      --green: #1e7e34;
      --blue: #1768ac;
      --red: #c62828;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--txt);
      background: linear-gradient(180deg, #eef3f7 0%, #f7f9fb 100%);
    }
    .wrap {
      max-width: 1420px;
      margin: 16px auto;
      padding: 0 14px 16px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(24, 39, 75, 0.05);
    }
    .side {
      padding: 14px;
      max-height: calc(100vh - 40px);
      overflow: auto;
    }
    .main {
      padding: 14px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 19px;
      letter-spacing: 0.2px;
    }
    h2 {
      margin: 0 0 8px 0;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.6px;
    }
    .sec {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      background: #fbfdff;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    select, input, textarea, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: var(--txt);
    }
    select, input { height: 38px; }
    textarea {
      min-height: 240px;
      resize: vertical;
      line-height: 1.35;
      font-family: Consolas, "Courier New", monospace;
    }
    #editor {
      min-height: 430px;
    }
    #layoutEditor {
      min-height: 200px;
    }
    button {
      cursor: pointer;
      font-weight: 600;
      transition: filter 120ms ease;
    }
    button:hover { filter: brightness(0.96); }
    .btn-blue { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
    .btn-line { background: #fff; color: var(--txt); }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 7px;
    }
    .status {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #f8fafc;
      font-size: 12px;
      color: #243746;
      min-height: 42px;
      white-space: pre-wrap;
    }
    .status.error {
      border-color: #f1b7b7;
      background: #fff5f5;
      color: var(--red);
    }
    .muted { color: var(--muted); font-size: 12px; margin: 0; }
    .check {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #2f3f4e;
    }
    .check input { width: 15px; height: 15px; }
    .preview {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f9fbfd;
      min-height: 280px;
    }
    iframe {
      width: 100%;
      height: 560px;
      border: 0;
      background: #fff;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .topline a {
      color: var(--blue);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
    }
    .topline a:hover { text-decoration: underline; }
    @media (max-width: 1120px) {
      .wrap {
        grid-template-columns: 1fr;
      }
      .side {
        max-height: none;
      }
      iframe {
        height: 430px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="card side">
      <h1>Painel de Edicao de PDF</h1>
      <p class="muted">Modo 1: editar dados (JSON). Modo 2: mapear campos por posicao.</p>

      <section class="sec">
        <h2>Dados do Registro</h2>
        <label for="tipo">Tipo de relatorio</label>
        <select id="tipo">
          <option value="analise-frutos">Analise de Frutos</option>
          <option value="relatorio-embarque-sede">Relatorio Embarque Sede</option>
        </select>

        <div class="row">
          <div>
            <label for="limit">Qtd. na lista</label>
            <input id="limit" type="number" min="1" max="200" value="50" />
          </div>
          <div style="display:flex;align-items:flex-end;">
            <button id="btn-listar" class="btn-blue">Atualizar lista</button>
          </div>
        </div>

        <label for="arquivo">Documentos JSON</label>
        <select id="arquivo" size="8"></select>

        <div class="row">
          <button id="btn-carregar" class="btn-line">Carregar JSON</button>
          <button id="btn-limpar" class="btn-line">Limpar editor</button>
        </div>

        <label for="fileName">Nome do PDF (opcional)</label>
        <input id="fileName" placeholder="ex: AF-ajustado.pdf" />

        <label class="check">
          <input id="salvarJson" type="checkbox" />
          <span>Salvar no JSON original e sobrescrever PDF original</span>
        </label>

        <button id="btn-gerar" class="btn-green" style="margin-top:8px;">Regenerar PDF (dados)</button>
        <div id="status" class="status">Pronto.</div>
      </section>

      <section class="sec">
        <h2>Mapa de Campos (Posicao)</h2>
        <p class="muted">Escolha um PDF base e diga onde cada campo sera escrito.</p>

        <label for="pdfBase">PDF base</label>
        <select id="pdfBase" size="7"></select>

        <div class="row">
          <button id="btn-listar-pdfs" class="btn-blue">Atualizar PDFs</button>
          <button id="btn-exemplo-layout" class="btn-line">Exemplo mapa</button>
        </div>

        <label for="layoutFileName">Nome PDF saida (opcional)</label>
        <input id="layoutFileName" placeholder="ex: RE-com-campos.pdf" />

        <label class="check">
          <input id="salvarMapa" type="checkbox" />
          <span>Salvar mapa .json em tmp_pdf_test/layout_maps</span>
        </label>

        <label for="layoutEditor">Mapa de campos JSON</label>
        <textarea id="layoutEditor" spellcheck="false"></textarea>

        <button id="btn-aplicar-campos" class="btn-green" style="margin-top:8px;">Aplicar Campos no PDF Base</button>
        <div id="statusLayout" class="status">Use ref: "top-left" para y contado do topo.</div>
      </section>
    </aside>

    <main class="card main">
      <div class="topline">
        <h2>JSON do registro</h2>
        <a id="pdfLink" href="#" target="_blank" rel="noopener noreferrer">Abrir PDF atual</a>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="preview">
        <iframe id="preview" title="Preview PDF"></iframe>
      </div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = {
      docs: [],
      pdfs: [],
      loadedFile: null,
      loadedType: null,
    };

    const tipoEl = $("tipo");
    const limitEl = $("limit");
    const arquivoEl = $("arquivo");
    const statusEl = $("status");
    const editorEl = $("editor");
    const fileNameEl = $("fileName");
    const salvarJsonEl = $("salvarJson");
    const pdfLinkEl = $("pdfLink");
    const previewEl = $("preview");

    const pdfBaseEl = $("pdfBase");
    const layoutEditorEl = $("layoutEditor");
    const layoutFileNameEl = $("layoutFileName");
    const salvarMapaEl = $("salvarMapa");
    const statusLayoutEl = $("statusLayout");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function setLayoutStatus(message, isError = false) {
      statusLayoutEl.textContent = message;
      statusLayoutEl.classList.toggle("error", isError);
    }

    async function api(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.success === false) {
        throw new Error(data.error || data.details || `HTTP ${response.status}`);
      }
      return data;
    }

    function buildOptionLabel(doc) {
      const dt = doc.atualizado_em ? new Date(doc.atualizado_em).toLocaleString("pt-BR") : "-";
      const pdfTag = doc.pdf_existe ? "PDF ok" : "PDF faltando";
      return `${dt} | ${doc.id} | ${pdfTag}`;
    }

    function buildPdfLabel(item) {
      const dt = item.atualizado_em ? new Date(item.atualizado_em).toLocaleString("pt-BR") : "-";
      return `${dt} | ${item.fonte_nome} | ${item.arquivo}`;
    }

    function refreshDocSelect() {
      arquivoEl.innerHTML = "";
      for (const doc of state.docs) {
        const option = document.createElement("option");
        option.value = doc.arquivo;
        option.textContent = buildOptionLabel(doc);
        arquivoEl.appendChild(option);
      }
    }

    function refreshPdfSelect() {
      pdfBaseEl.innerHTML = "";
      for (const item of state.pdfs) {
        const option = document.createElement("option");
        option.value = item.id;
        option.textContent = buildPdfLabel(item);
        pdfBaseEl.appendChild(option);
      }
    }

    async function carregarLista() {
      const tipo = tipoEl.value;
      const limit = Number(limitEl.value || 50);
      setStatus("Carregando lista...");

      try {
        const result = await api(`/api/pdf-editor/documentos?tipo=${encodeURIComponent(tipo)}&limit=${encodeURIComponent(limit)}`);
        state.docs = Array.isArray(result.data) ? result.data : [];
        refreshDocSelect();

        if (state.docs.length > 0) {
          arquivoEl.value = state.docs[0].arquivo;
          await carregarConteudo();
        } else {
          editorEl.value = "";
          state.loadedFile = null;
          state.loadedType = null;
          setStatus("Nenhum JSON encontrado para esse tipo.");
        }
      } catch (error) {
        setStatus(`Falha ao listar documentos:\n${error.message}`, true);
      }
    }

    async function carregarPdfs() {
      setLayoutStatus("Carregando PDFs...");
      try {
        const result = await api("/api/pdf-editor/pdfs?limit=300");
        state.pdfs = Array.isArray(result.data) ? result.data : [];
        refreshPdfSelect();
        if (state.pdfs.length > 0) {
          pdfBaseEl.value = state.pdfs[0].id;
        }
        setLayoutStatus(`PDFs carregados: ${state.pdfs.length}`);
      } catch (error) {
        setLayoutStatus(`Falha ao listar PDFs:\n${error.message}`, true);
      }
    }

    async function carregarConteudo() {
      const tipo = tipoEl.value;
      const arquivo = arquivoEl.value;

      if (!arquivo) {
        setStatus("Selecione um documento na lista.", true);
        return;
      }

      setStatus("Abrindo JSON...");
      try {
        const result = await api(
          `/api/pdf-editor/conteudo?tipo=${encodeURIComponent(tipo)}&arquivo=${encodeURIComponent(arquivo)}`
        );
        editorEl.value = JSON.stringify(result.payload || {}, null, 2);
        state.loadedFile = result.arquivo;
        state.loadedType = tipo;

        if (result.pdf_url) {
          pdfLinkEl.href = result.pdf_url;
          previewEl.src = result.pdf_url;
        }
        setStatus(`JSON carregado: ${result.arquivo}`);
      } catch (error) {
        setStatus(`Falha ao abrir documento:\n${error.message}`, true);
      }
    }

    function parseJsonRequired(raw, label) {
      const content = String(raw || "").trim();
      if (!content) {
        throw new Error(`${label} vazio.`);
      }
      try {
        return JSON.parse(content);
      } catch (error) {
        throw new Error(`${label} invalido: ${error.message}`);
      }
    }

    function parseEditorJsonOptional() {
      const raw = editorEl.value.trim();
      if (!raw) return null;
      return parseJsonRequired(raw, "JSON do registro");
    }

    async function regenerarPdf() {
      const tipo = tipoEl.value;
      let payload;
      try {
        payload = parseJsonRequired(editorEl.value, "JSON do registro");
      } catch (error) {
        setStatus(error.message, true);
        return;
      }

      const salvarJson = salvarJsonEl.checked;
      const arquivoSelecionado = arquivoEl.value || null;

      if (salvarJson && !arquivoSelecionado) {
        setStatus("Para sobrescrever o PDF original, selecione um JSON na lista.", true);
        return;
      }

      setStatus("Regenerando PDF...");
      try {
        const result = await api("/api/pdf-editor/regenerar", {
          method: "POST",
          body: JSON.stringify({
            tipo,
            payload,
            salvar_json: salvarJson,
            arquivo_origem: arquivoSelecionado,
            file_name: fileNameEl.value.trim() || null,
          }),
        });

        if (result.pdf_url) {
          pdfLinkEl.href = result.pdf_url;
          previewEl.src = result.pdf_url;
        }

        const msg = [
          `PDF gerado com sucesso (${result.modo}).`,
          `Arquivo: ${result.pdf_file_name}`,
          result.json_path_atualizado ? `JSON atualizado: ${result.json_path_atualizado}` : "",
        ].filter(Boolean).join("\n");

        setStatus(msg);

        if (salvarJson) {
          await carregarLista();
        }
      } catch (error) {
        setStatus(`Falha ao regenerar PDF:\n${error.message}`, true);
      }
    }

    function exemploLayout() {
      return {
        opcoes: {
          ref: "top-left",
          cor: "#0f172a",
          mostrarCaixa: false
        },
        valores: {
          observacao_manual: "Texto digitado manualmente"
        },
        campos: [
          {
            nome: "cliente",
            texto: "{{generalInfo.customer}}",
            pagina: 1,
            x: 86,
            y: 130,
            tamanho: 11,
            cor: "#111827",
            ref: "top-left"
          },
          {
            nome: "container",
            texto: "{{generalInfo.container}}",
            pagina: 1,
            x: 86,
            y: 152,
            tamanho: 11,
            cor: "#111827",
            ref: "top-left"
          },
          {
            nome: "obs",
            texto: "OBS: {{valores.observacao_manual}}",
            pagina: 1,
            x: 86,
            y: 174,
            tamanho: 10,
            cor: "#065f46",
            ref: "top-left"
          }
        ]
      };
    }

    function carregarExemploLayout() {
      let payload = null;
      try {
        payload = parseEditorJsonOptional();
      } catch (error) {
        setLayoutStatus(error.message, true);
        return;
      }
      const base = exemploLayout();
      if (payload && typeof payload === "object") {
        base.valores = {
          ...base.valores,
          ...payload.valores
        };
      }
      layoutEditorEl.value = JSON.stringify(base, null, 2);
      setLayoutStatus("Exemplo de mapa carregado.");
    }

    async function aplicarCampos() {
      const pdfArquivo = pdfBaseEl.value;
      if (!pdfArquivo) {
        setLayoutStatus("Selecione um PDF base.", true);
        return;
      }

      let layout;
      try {
        layout = parseJsonRequired(layoutEditorEl.value, "Mapa de campos");
      } catch (error) {
        setLayoutStatus(error.message, true);
        return;
      }

      let payload = null;
      try {
        payload = parseEditorJsonOptional();
      } catch (error) {
        setLayoutStatus(error.message, true);
        return;
      }

      setLayoutStatus("Aplicando campos no PDF...");
      try {
        const result = await api("/api/pdf-editor/aplicar-campos", {
          method: "POST",
          body: JSON.stringify({
            pdf_arquivo: pdfArquivo,
            layout,
            payload: payload || {},
            file_name: layoutFileNameEl.value.trim() || null,
            salvar_mapa: salvarMapaEl.checked,
          }),
        });

        const pdfUrl = result?.resultado?.pdf_url;
        if (pdfUrl) {
          previewEl.src = pdfUrl;
          pdfLinkEl.href = pdfUrl;
        }

        const resumo = result?.resumo || {};
        const msg = [
          "Campos aplicados com sucesso.",
          `PDF: ${result?.resultado?.pdf_file_name || "-"}`,
          `Aplicados: ${resumo.aplicados ?? 0}`,
          `Ignorados: ${resumo.ignorados ?? 0}`,
          result?.resultado?.mapa_path_local ? `Mapa salvo: ${result.resultado.mapa_path_local}` : "",
        ].filter(Boolean).join("\n");

        setLayoutStatus(msg);
      } catch (error) {
        setLayoutStatus(`Falha ao aplicar campos:\n${error.message}`, true);
      }
    }

    $("btn-listar").addEventListener("click", carregarLista);
    $("btn-carregar").addEventListener("click", carregarConteudo);
    $("btn-gerar").addEventListener("click", regenerarPdf);
    $("btn-limpar").addEventListener("click", () => {
      editorEl.value = "";
      fileNameEl.value = "";
      setStatus("Editor limpo.");
    });

    $("btn-listar-pdfs").addEventListener("click", carregarPdfs);
    $("btn-exemplo-layout").addEventListener("click", carregarExemploLayout);
    $("btn-aplicar-campos").addEventListener("click", aplicarCampos);

    tipoEl.addEventListener("change", () => {
      editorEl.value = "";
      state.loadedFile = null;
      state.loadedType = null;
      carregarLista();
    });

    arquivoEl.addEventListener("dblclick", carregarConteudo);
    pdfBaseEl.addEventListener("dblclick", async () => {
      const selected = state.pdfs.find((item) => item.id === pdfBaseEl.value);
      if (selected?.pdf_url) {
        previewEl.src = selected.pdf_url;
        pdfLinkEl.href = selected.pdf_url;
      }
    });

    carregarLista();
    carregarPdfs();
    layoutEditorEl.value = JSON.stringify(exemploLayout(), null, 2);
  </script>
</body>
</html>
